name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: build
          path: dist/

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: build
          path: dist/
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::436350383194:role/gha-xts-sales-deploy
          aws-region: us-east-1
      - run: aws s3 sync dist/ s3://xts-sales-website-deploy/staging/ --delete
      - run: aws cloudfront create-invalidation --distribution-id E1HKJFIPXJR6FX --paths "/*"

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: build
          path: dist/
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::436350383194:role/gha-xts-sales-deploy
          aws-region: us-east-1
      - run: aws s3 sync dist/ s3://xts-sales-website-deploy/production/ --delete
      - run: aws cloudfront create-invalidation --distribution-id E1770YPOBMGF2D --paths "/*"